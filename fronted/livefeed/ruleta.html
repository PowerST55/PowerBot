<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

<body>

            <canvas id="wheel"></canvas>

    </div>

    <div id="overlay-background" class="overlay-background"></div>
    <div id="winner-overlay">
        <div id="winner-container">
            <h2 id="winner-title">Felicidades A Nuestro Ganador:</h2>
            <div class="winner-content">
                <img id="winner-image" class="winner-image" src="" alt="Winner Image" />

            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>
    </div>


    <audio id="spin-var1" src="sounds/spin/Spin-var1.wav"></audio>
    <audio id="spin-var2" src="sounds/spin/Spin-var2.wav"></audio>
    <audio id="spin-var3" src="sounds/spin/Spin-var3.wav"></audio>
    <audio id="spin-var4" src="sounds/spin/Spin-var4.wav"></audio>
    <audio id="spin-var5" src="sounds/spin/Spin-var5.wav"></audio>

    <audio id="winner-sound" src="sounds/spin/winner-soundg.mp3"></audio>
    <audio id="join-sound" src="sounds/spin/join-sound.mp3"></audio>

    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <script>
        WebFont.load({
            google: {
                families: ['Oswald:200,300,400,500,600,700', 'Poppins:400,600']
            },
            active: function () {
                document.body.style.opacity = '1';
            }
        });

        let items = [];
        let spinning = false;
        let keepWinner = false; // Booleano para mantener al ganador
        let slowRotation = true; // Controla el giro lento continuo
        let animationFinished = false; // Flag para controlar cuando terminó la animación de entrada
        let canvas = document.getElementById("wheel");
        let ctx = canvas.getContext("2d");
        let size = 519;
        let scale = size / 1000;
        let currentRotation = 0;
        let socket;
        let placeholderprofile = "https://th.bing.com/th/id/OIP.aiDGdmdUAX_iNgRMERipyQHaHF?rs=1&pid=ImgDetMain"

        // Configuracion de velocidad de ruleta (ms y grados/frame).
        const IDLE_ROTATION_BASE_DEG = 0.035;
        const IDLE_ROTATION_PER_USER_DEG = 0.0018;
        const IDLE_ROTATION_MIN_DEG = 0.012;
        const SPIN_BASE_MIN_MS = 6000;
        const SPIN_BASE_RANDOM_MS = 1800;
        const SPIN_USER_THRESHOLD = 8;
        const SPIN_PER_USER_MS_LOW = 420;
        const SPIN_PER_USER_MS_HIGH = 780;
        const SPIN_EXTRA_CURVE_MS = 36;
        const SPIN_MAX_DURATION_MS = 26000;

        function hashString(value) {
            let hash = 0;
            const text = String(value || "");
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        function fallbackColorFromText(text) {
            const h = hashString(text) % 360;
            return `hsl(${h} 80% 22%)`;
        }

        function normalizeDisplayName(name) {
            return String(name || "").replace(/^@+/, "").trim();
        }

        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h = 0;
            let s = 0;
            const l = (max + min) / 2;

            if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r:
                        h = (g - b) / d + (g < b ? 6 : 0);
                        break;
                    case g:
                        h = (b - r) / d + 2;
                        break;
                    default:
                        h = (r - g) / d + 4;
                        break;
                }
                h /= 6;
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100),
            };
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function getIdleRotationSpeedDeg() {
            const participants = Math.max(0, items.length);
            const dynamicSpeed = IDLE_ROTATION_BASE_DEG - (participants * IDLE_ROTATION_PER_USER_DEG);
            return clamp(dynamicSpeed, IDLE_ROTATION_MIN_DEG, IDLE_ROTATION_BASE_DEG);
        }

        function extractAverageColor(image, fallbackText) {
            try {
                const sampleSize = 24;
                const sampleCanvas = document.createElement("canvas");
                sampleCanvas.width = sampleSize;
                sampleCanvas.height = sampleSize;
                const sampleCtx = sampleCanvas.getContext("2d", { willReadFrequently: true });

                if (!sampleCtx) {
                    return fallbackColorFromText(fallbackText);
                }

                sampleCtx.drawImage(image, 0, 0, sampleSize, sampleSize);
                const data = sampleCtx.getImageData(0, 0, sampleSize, sampleSize).data;

                let r = 0;
                let g = 0;
                let b = 0;
                let count = 0;

                for (let i = 0; i < data.length; i += 4) {
                    const alpha = data[i + 3];
                    if (alpha < 25) continue;
                    r += data[i];
                    g += data[i + 1];
                    b += data[i + 2];
                    count += 1;
                }

                if (count === 0) {
                    return fallbackColorFromText(fallbackText);
                }

                const avgR = Math.round(r / count);
                const avgG = Math.round(g / count);
                const avgB = Math.round(b / count);
                const hsl = rgbToHsl(avgR, avgG, avgB);

                // Oscurecer 30% el color promedio del avatar para mejorar contraste general.
                const sat = clamp(hsl.s, 60, 95);
                const light = clamp(Math.round(hsl.l * 0.7), 11, 24);
                return `hsl(${hsl.h} ${sat}% ${light}%)`;
            } catch (error) {
                return fallbackColorFromText(fallbackText);
            }
        }

        // Elementos de audio
        const spinSounds = [
            document.getElementById("spin-var1")
            //document.getElementById("spin-var2")
            //document.getElementById("spin-var3"),
            //document.getElementById("spin-var4"),
            // document.getElementById("spin-var5")

        ];
        spinSounds.forEach(sound => sound.loop = false);
        const winnerSound = document.getElementById("winner-sound");
        const joinSound = document.getElementById("join-sound");

        function calculateWheelSize() {
            const maxByWidth = Math.floor(window.innerWidth * 0.62);
            const maxByHeight = Math.floor(window.innerHeight * 0.74);
            return Math.max(420, Math.min(760, maxByWidth, maxByHeight));
        }

        function applyResponsiveWheelSize() {
            size = calculateWheelSize();
            scale = size / 1000;
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = `${size}px`;
            canvas.style.height = `${size}px`;
            document.documentElement.style.setProperty('--wheel-size', `${size}px`);
        }

        applyResponsiveWheelSize();
        function drawWheel() {
            let total = items.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (total === 0) {
                ctx.fillStyle = `hsl(327, 100%, 11%)`; // Cambia este color según tus preferencias
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Añadir el texto "PowerBot SpinWheel" en el centro de la ruleta
                ctx.save();
                ctx.fillStyle = "white"; // Color del texto, puedes cambiarlo si prefieres otro
                ctx.font = `bold ${Math.max(32, Math.round(80 * scale))}px Oswald`; // Estilo y tamaño del texto
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                let lines = ["✩Ruleta✩", "PowerBot"];
                let lineHeight = 100 * scale; // Ajusta la altura entre líneas según tus preferencias

                lines.forEach((line, index) => {
                    ctx.fillText(line, canvas.width / 2, (canvas.height / 2) - (lineHeight / 2) + (index * lineHeight));
                });

                // Añadir el texto "Type !join to participate" en gris claro debajo del texto principal
                ctx.fillStyle = "lightgray"; // Color del texto pequeño
                ctx.font = `bold ${Math.max(20, Math.round(40 * scale))}px Oswald`; // Estilo y tamaño del texto pequeño
                ctx.fillText("Escribe !participar para unirte", canvas.width / 2, (canvas.height / 2) + (lines.length * lineHeight / 2) + 50);

                ctx.restore();

                return;
            }

            let angle = (2 * Math.PI) / total;
            let baseImgSize = 142 * scale; // Tamaño base de la imagen
            let minImgSize = 62 * scale;  // Tamaño mínimo de la imagen si hay muchos items
            let imgSize = baseImgSize; // Inicializa el tamaño de la imagen
            // Ajusta aquí el grosor de las líneas/separadores de segmentos.
            const segmentStrokeWidth = 5.8 * scale;

            // Ajustar el tamaño de la imagen según la cantidad de items
            if (total > 6) {
                imgSize = Math.max(minImgSize, baseImgSize * (6 / total)); // Reduce el tamaño de la imagen si hay muchos items
            }


            for (let i = 0; i < total; i++) {
                ctx.beginPath();
                ctx.moveTo(size / 2, size / 2);
                ctx.arc(size / 2, size / 2, size / 2, i * angle, (i + 1) * angle);
                
                ctx.fillStyle = items[i].color || fallbackColorFromText(items[i].text || i);



  //hsl(179, 53%, 25%)   hsl(${230 + i * (100 / total)}, 50%, 30%)
                ctx.fill();
                // Los separadores se dibujan al final en un solo pase para mantener grosor uniforme.

                let img = new Image();
                console.log("name", items[i].text, "img", items[i].image);
                img.src = items[i].image.src;

                // Renderizar avatar/texto en orientación tangencial (perpendiculares al centro).
                const radialDistance = Math.max(size * 0.33, (size / 2) - imgSize - (18 * scale));
                const avatarRadius = radialDistance - (130 * scale);
                const textRadius = radialDistance + (20 * scale);
                const avatarX = 0;
                const avatarY = 0;
                const textX = 0;
                const textY = 0;

                ctx.save();
                ctx.translate(size / 2, size / 2);
                ctx.rotate(i * angle + angle / 2);
                ctx.translate(textRadius, 0);
                ctx.rotate(Math.PI / 2);

                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const displayName = normalizeDisplayName(items[i].text);
                let text = displayName.length > 16 ? displayName.substring(0, 16) + '-' : displayName;
                const participantScale = Math.max(0.62, Math.min(1.0, 1.22 - (total * 0.045)));
                const fontMax = 124 * scale * participantScale;
                const fontMin = 42 * scale * participantScale;
                const fontByName = (460 * scale * participantScale) / Math.max(3, text.length);
                let fontSize = Math.min(fontMax, Math.max(fontMin, fontByName));
                ctx.font = `bold ${fontSize}px Oswald`;

                const arcLengthAtRadius = angle * radialDistance;
                const textBoundaryPadding = 20 * scale;
                const maxTextWidth = Math.max(90 * scale, arcLengthAtRadius - textBoundaryPadding);
                while (text.length > 1 && ctx.measureText(text).width > maxTextWidth) {
                    text = `${text.slice(0, -2)}-`;
                }

                // Resalte fuerte del nombre para stream (se compacta con más participantes).
                ctx.shadowColor = 'rgba(0, 0, 0, 0.78)';
                ctx.shadowBlur = 10 * scale;
                ctx.lineWidth = 6.2 * scale * participantScale;
                ctx.lineJoin = "round";
                ctx.strokeStyle = "rgba(0, 0, 0, 0.82)";
                ctx.strokeText(text, textX, textY);
                ctx.fillText(text, textX, textY);
                ctx.shadowBlur = 0;
                ctx.restore();

                img.onload = (function (index, imageAngle) {
                    return function () {
                        ctx.save();
                        ctx.translate(size / 2, size / 2);
                        ctx.rotate(imageAngle + angle / 2);
                        ctx.translate(avatarRadius, 0);
                        ctx.rotate(Math.PI / 2);

                        ctx.beginPath();
                        ctx.arc(avatarX, avatarY, (imgSize / 2) + (4.8 * scale), 0, Math.PI * 2);
                        ctx.clip();
                        ctx.drawImage(img, avatarX - imgSize / 2, avatarY - imgSize / 2, imgSize, imgSize);

                        // Contorno blanco para separar avatar del fondo del segmento.
                        ctx.beginPath();
                        ctx.arc(avatarX, avatarY, (imgSize / 2) + (4.8 * scale), 0, Math.PI * 2);
                        ctx.lineWidth = 10 * scale;
                        ctx.strokeStyle = "#ffffff";
                        ctx.stroke();
                        ctx.restore();
                    };
                })(i, i * angle);
            }

            if (total === 2) {
                // Para 2 usuarios: diámetro en el límite real entre ambos segmentos (0°/180°).
                // Esto separa ambas mitades sin atravesar el centro visual de cada usuario.
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(0, size / 2);
                ctx.lineTo(size, size / 2);
                ctx.lineWidth = segmentStrokeWidth;
                ctx.strokeStyle = "white";
                ctx.lineCap = "butt";
                ctx.stroke();
                ctx.restore();
            } else if (total >= 3) {
                // Para 3+ usuarios: separadores radiales en pase único para evitar líneas más finas.
                ctx.save();
                ctx.lineWidth = segmentStrokeWidth;
                ctx.strokeStyle = "white";
                ctx.lineCap = "butt";

                for (let i = 0; i < total; i++) {
                    const separatorAngle = i * angle;
                    const endX = (size / 2) + Math.cos(separatorAngle) * (size / 2);
                    const endY = (size / 2) + Math.sin(separatorAngle) * (size / 2);

                    ctx.beginPath();
                    ctx.moveTo(size / 2, size / 2);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                }

                ctx.restore();
            }



            if (slowRotation) {
                requestAnimationFrame(rotateWheelSlowly);
            }
        }

        function rotateWheelSlowly() {
            if (!slowRotation) return;
            currentRotation += getIdleRotationSpeedDeg(); // En reposo: más lenta y baja con más participantes
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            requestAnimationFrame(rotateWheelSlowly);
        }

        function spinWheel(rotation) {
            if (items.length < 2 || spinning) return;

            spinning = true;
            slowRotation = false;
            canvas.style.transition = "none";

            const participants = Math.max(2, items.length);
            // Duracion base + escalado agresivo para que con muchos usuarios sea mucho mas lenta.
            const baseDuration = SPIN_BASE_MIN_MS + Math.random() * SPIN_BASE_RANDOM_MS;
            const lowTierUsers = Math.min(participants, SPIN_USER_THRESHOLD);
            const highTierUsers = Math.max(0, participants - SPIN_USER_THRESHOLD);
            const participantExtra =
                (lowTierUsers * SPIN_PER_USER_MS_LOW) +
                (highTierUsers * SPIN_PER_USER_MS_HIGH) +
                ((highTierUsers * highTierUsers) * SPIN_EXTRA_CURVE_MS);
            let spinDuration = baseDuration + participantExtra;
            spinDuration = Math.min(spinDuration, SPIN_MAX_DURATION_MS);
            let startRotation = currentRotation;
            let startTime = performance.now();
            let lastIndex = -1;
            let lastPlayTime = 0;

            function updateRotation() {
                let elapsedTime = performance.now() - startTime;
                let progress = elapsedTime / spinDuration;

                if (progress >= 1) {
                    spinning = false;
                    finalizeSpin();
                    return;
                }

                let easeOut = 1 - Math.pow(1 - progress, 3); // Desaceleración progresiva
                let newRotation = startRotation - easeOut * rotation; // Usar el número random del servidor

                let currentDegrees = (newRotation % 360 + 360) % 360;
                let segmentAngle = 360 / items.length;
                let index = Math.floor(((360 - currentDegrees - 90) % 360) / segmentAngle);
                index = (index + items.length) % items.length;

                let now = performance.now();
                let timeSinceLastPlay = now - lastPlayTime;
                let estimatedItemTime = spinDuration / (rotation / segmentAngle);

                // 🛑 Solo reproducir si cambió de ítem y ha pasado suficiente tiempo
                if (index !== lastIndex && timeSinceLastPlay > estimatedItemTime * 0.7) {
                    lastIndex = index;
                    lastPlayTime = now;

                    let pitch = 1.5 - progress * 0.7; // Variación de pitch más natural
                    let selectedSound = spinSounds[Math.floor(Math.random() * spinSounds.length)]; // Seleccionar sonido aleatorio

                    selectedSound.playbackRate = Math.max(0.8, pitch);

                    if (progress < 0.98) {
                        selectedSound.currentTime = 0;
                        selectedSound.play();
                        console.log(`🔊 Tocó nuevo ítem: ${items[index].text}, Pitch: ${pitch.toFixed(2)}, Sonido: ${selectedSound.src}`);
                    }
                }

                canvas.style.transform = `rotate(${newRotation}deg)`;
                requestAnimationFrame(updateRotation);
            }

            requestAnimationFrame(updateRotation);

            function finalizeSpin() {
                let finalDegrees = (currentRotation % 360 + 360) % 360;
                let segmentAngle = 360 / items.length;
                let index = Math.floor(((360 - finalDegrees - 90) % 360) / segmentAngle);
                index = (index + items.length) % items.length;

                



                let winnerIndex = lastIndex;
                let winner = items[winnerIndex].text;
                let winnerimg = items[winnerIndex].image.src;
                let winnerColor = `hsl(${220 + winnerIndex * (90 / items.length)}, ${30 + (winnerIndex % 2) * 10}%, ${15 + (winnerIndex % 3) * 10}%)`;
                console.log("🎨 Color del ganador:", winnerColor);

                if (!keepWinner) {
                    items.splice(winnerIndex, 1);
                    drawWheel();
                }
                showWinner(winner, winnerimg, winnerColor );

                setTimeout(() => {
                    slowRotation = true;
                    requestAnimationFrame(rotateWheelSlowly);
                }, 4000);
            }
        }









        function showWinner(winner, winnerimg, winnerColor) {
            const mensaje = {
                type: "winnerspin",
                data: winner
            };
            sendMessageToServer(mensaje);
            const overlayBackground = document.getElementById("overlay-background");
            const winnerOverlay = document.getElementById("winner-overlay");
            const winnerNameElement = document.getElementById("winner-name");
            const winnerImgElement = document.getElementById("winner-image");
            const progressBar = document.getElementById("progress-bar");
            const winnerSound = document.getElementById("winner-sound");


            // Mostrar el fondo oscuro y el overlay
            overlayBackground.style.display = "block";
            winnerOverlay.style.display = "flex";
            winnerOverlay.style.flexDirection = "column";
            winnerOverlay.style.alignItems = "center";
            winnerOverlay.style.justifyContent = "center";
            winnerOverlay.style.background = winnerColor;

            // Ajustar el contenido
            winnerNameElement.textContent = normalizeDisplayName(winner);
            winnerImgElement.src = winnerimg;

            // Reproducir sonido
            winnerSound.playbackRate = 0.8 + Math.random() * 0.9;
            winnerSound.currentTime = 0;
            winnerSound.play();

            // Reiniciar la animación de la barra de progreso
            progressBar.style.animation = "none";
            void progressBar.offsetWidth; // Forzar reflujo para reiniciar animación
            progressBar.style.animation = "progress-animation 5s linear forwards";

            // Ocultar el overlay y el fondo oscuro después de 5 segundos

            setTimeout(() => {
                winnerOverlay.style.display = "none";
                overlayBackground.style.display = "none";
            }, 5000);
        }
        
function buildWebSocketUrl() {
    const params = new URLSearchParams(window.location.search);
    const directUrl = params.get("ws");
    if (directUrl) {
        return directUrl;
    }

    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const host = params.get("wshost") || window.location.hostname || "127.0.0.1";
    // Conectar directo al servidor de eventos para evitar el proxy /ws del servidor web.
    const port = params.get("wsport") || "8765";
    const path = params.get("wspath") || "/ws";
    return `${protocol}://${host}:${port}${path}`;
}

const WS_URL = buildWebSocketUrl();
let reconnectTimer = null;
let reconnectAttempts = 0;
let redirectInProgress = false;

function scheduleReconnect() {
    if (redirectInProgress) return;
    if (reconnectTimer) return;

    const delayMs = Math.min(9000, Math.round(800 * Math.pow(1.7, reconnectAttempts)));
    reconnectAttempts += 1;
    console.warn(`Reintentando WebSocket en ${delayMs}ms (intento ${reconnectAttempts})`);
    reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
    }, delayMs);
}

function connect() {
    const joinSound = document.getElementById("join-sound");

    try {
        socket = new WebSocket(WS_URL);
    } catch (error) {
        console.error("No se pudo crear socket:", error);
        scheduleReconnect();
        return;
    }

    socket.onopen = () => {
        console.log("Conectado al WebSocket");
        reconnectAttempts = 0;
        document.querySelector('.container').classList.add('enter');
        
        // Marcar que la animación terminó después de 1.6 segundos
        setTimeout(() => {
            animationFinished = true;
            console.log("Animación de entrada finalizada");
        }, 1600);
    };

    socket.onmessage = (event) => {
        let data;
        try {
            data = JSON.parse(event.data);
        } catch (error) {
            console.error("Error al parsear JSON:", error, "Mensaje recibido:", event.data);
            return;
        }

        console.log("Mensaje recibido:", data);

        switch (data.type) {
            case "connected":
                // Mensaje handshake del servidor WS.
                break;
            case "redirect":
                console.log("Redirigiendo a:", data.url);
                redirectInProgress = true;
                // Agregar clase de salida y esperar a que termine la animación
                const container = document.querySelector('.container');
                container.classList.add('exit');
                
                // Esperar 1.6s (duración de la animación) antes de hacer el redirect
                setTimeout(() => {
                    window.location.href = data.url;
                }, 1600);
                break;
            case "add_item":
                loadImage(data.url).then((image) => {
                    const itemColor = extractAverageColor(image, data.item);
                    items.push({ text: data.item, image: image, color: itemColor });
                    console.log(items);
                    drawWheel();

                    joinSound.playbackRate = 0.9 + Math.random() * 0.3; // Pitch entre 0.9 y 1.2
                    joinSound.currentTime = 0; // Reiniciar el sonido
                    joinSound.play();
                }).catch((error) => {
                    console.error("Error cargando la imagen:", error);
                });
                break;
            case "spin":
                spinWheel(data.rotation);
                break;
            case "update":
                drawWheel();
                break;
            case "reset":
                items = [];
                drawWheel();
                break;
            case "set_keep_winner":
                keepWinner = data.value;
                break;
            case "toggle_mini":
                if (animationFinished) {
                    toggleMiniMode(data.value);
                } else {
                    console.log("Esperando a que termine la animación de entrada");
                }
                break;
            default:
                console.warn("Tipo de mensaje desconocido:", data);
        }
    };

    socket.onclose = () => {
        if (redirectInProgress) {
            return;
        }
        console.warn("WebSocket cerrado, intentando reconexión...");
        scheduleReconnect();
    };

    socket.onerror = (error) => {
        console.error("Error en WebSocket:", error);
        if (socket && socket.readyState !== WebSocket.CLOSED) {
            socket.close();
        }
    };
}
function sendMessageToServer(message) {
    if (socket.readyState === WebSocket.OPEN) { // Asegúrate de que la conexión está abierta
        socket.send(JSON.stringify(message)); // Convierte el mensaje en formato JSON y lo envía
        console.log("Mensaje enviado:", message);
    } else {
        console.error("La conexión no está abierta, no se pudo enviar el mensaje.");
    }
}

function toggleMiniMode(isMini) {
    const container = document.querySelector('.container');
    
    if (isMini) {
        // Entrar en modo mini - remover .enter primero para que esté en estado estable (centrado)
        container.classList.remove('enter');
        // Forzar reflow para aplicar el cambio
        void container.offsetHeight;
        // Ahora agregar .mini para que las transiciones animen del centro al top-right
        container.classList.add('mini');
        container.classList.remove('exit');
        console.log("✅ Ruleta minimizada");
    } else {
        // Volver a modo normal - las transiciones CSS harán el trabajo
        container.classList.remove('mini', 'exit');
        console.log("❌ Ruleta maximizada");
    }
}

        function loadImage(url) {
    return new Promise((resolve, reject) => {
        const image = new Image();
        image.crossOrigin = "anonymous";

        // Resolver cuando la imagen está cargada
        image.onload = () => resolve(image);

        // Placeholder en caso de error
        image.onerror = () => {
            image.crossOrigin = "anonymous";
            image.src = "https://th.bing.com/th/id/OIP.aiDGdmdUAX_iNgRMERipyQHaHF?rs=1&pid=ImgDetMain"; // Imagen de respaldo
            console.warn(`No se pudo cargar la imagen desde ${url}. Se usará el placeholder.`);
            resolve(image); // Resolver con el placeholder en lugar de rechazar
        };

        // Asignar la URL de la imagen
        image.src = url;
    });
}
