<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones Automáticas</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/video-notifications.css">
    <link rel="stylesheet" href="css/codes.css">
</head>
<body>
    <!-- Plantilla para notificación estilo 1 -->
    <audio id="notification-sound" src="sounds/notification/notification.wav" preload="auto"></audio>

    <template id="template-style1">
        <div class="notification-box style-1">
            <div class="notification-title"></div>
            <div class="notification-message"></div>
        </div>
    </template>

    <!-- Plantilla para notificación estilo 2 -->
    <template id="template-style2">
        <div class="notification-box style-2">
            <div class="upper-container">
                <img class="profile-image" src="" alt="Perfil">
                <div class="notification-title"></div>
            </div>
            <div class="notification-message"></div>
        </div>
    </template>

    <div id="notifications-root"></div>
    <div id="video-container">
        <video id="notification-video" playsinline autoplay muted></video>
    </div>
    <div id="code-display"></div>

    <script>
        const notificationsContainer = [];
        const maxNotifications = 4;
        let storePath = '';
        const storePathCandidates = [
            '/assets/store',
            'assets/store',
            '/store',
            'store',
            '/fronted/assets/store'
        ];
        const notificationCatalog = {}; // Almacenar configuraciones cargadas
        const catalogLoadPromises = {}; // Evitar doble carga simultanea por ID
        const mediaPathCache = {
            video: {},
            audio: {}
        };
        const notificationQueue = []; // Cola de notificaciones pendientes
        let isPlayingNotification = false; // Flag para saber si se está reproduciendo una notificación
        const defaultNotificationSound = 'sounds/notification/notification.wav';
        const audioWarmupState = {
            readyPromise: null,
            currentSrc: null
        };
        
        // --- VARIABLES PARA CÓDIGOS ---
        let activeCode = null;
        let codeElement = null;
        let codeTimeout = null;
        let codeBlinkInterval = null;
        let animationFrameId = null; // Variable global para la animación
        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];
        let colorIndex = 0;

        function ensureRoot() {
            let root = document.getElementById('notifications-root');
            if (!root) {
                root = document.createElement('div');
                root.id = 'notifications-root';
                document.body.appendChild(root);
            }
            return root;
        }

        function uniqueArray(values) {
            return [...new Set(values.filter(Boolean))];
        }

        function normalizeStoreBasePath(path) {
            if (!path) return '';
            const normalized = normalizePath(path).replace(/\/+$/, '');
            if (!normalized) return '';
            if (/^(https?:)?\/\//i.test(normalized)) return rewriteLoopbackUrlForBrowser(normalized);
            if (normalized.startsWith('/')) return normalized;
            return `/${normalized}`;
        }

        function getStoreBaseCandidates() {
            const params = new URLSearchParams(window.location.search);
            const fromParams = [
                params.get('store'),
                params.get('storepath'),
                params.get('storePath')
            ].map(normalizeStoreBasePath);

            const fromDefaults = storePathCandidates.map(normalizeStoreBasePath);
            const preferred = normalizeStoreBasePath(storePath);
            const candidates = uniqueArray([preferred, ...fromParams, ...fromDefaults]);
            return candidates;
        }

        function shouldPreloadCatalog() {
            const params = new URLSearchParams(window.location.search);
            const preloadFlag = (params.get('preloadStore') || params.get('catalog') || '').toLowerCase();
            return preloadFlag === '1' || preloadFlag === 'true' || preloadFlag === 'yes';
        }

        function normalizePath(path) {
            if (!path) return '';
            return String(path).replace(/\\/g, '/').trim();
        }

        function rewriteLoopbackUrlForBrowser(urlValue) {
            try {
                const parsed = new URL(urlValue, window.location.origin);
                if (["127.0.0.1", "localhost", "0.0.0.0"].includes(parsed.hostname)) {
                    parsed.protocol = window.location.protocol;
                    parsed.host = window.location.host;
                }
                return parsed.toString();
            } catch (_error) {
                return urlValue;
            }
        }

        function isAbsoluteMediaUrl(path) {
            return /^(https?:)?\/\//i.test(path) || path.startsWith('/');
        }

        function toMediaUrl(path, notifId, basePath) {
            const normalized = normalizePath(path);
            if (!normalized) return '';
            if (isAbsoluteMediaUrl(normalized)) return rewriteLoopbackUrlForBrowser(normalized);
            if (notifId) {
                const base = normalizeStoreBasePath(basePath || storePath || getStoreBaseCandidates()[0]);
                if (!base) return '';
                return `${base}/${notifId}/${normalized}`;
            }
            return normalized;
        }

        async function checkMediaExists(path) {
            if (!path) return false;
            try {
                const headResponse = await fetch(path, { method: 'HEAD', cache: 'no-store' });
                if (headResponse.ok) {
                    return true;
                }

                // Algunos servidores estaticos no soportan HEAD para archivos.
                if (headResponse.status === 405 || headResponse.status === 501) {
                    const getResponse = await fetch(path, { method: 'GET', cache: 'no-store' });
                    if (getResponse.ok) {
                        if (getResponse.body) {
                            getResponse.body.cancel().catch(() => {});
                        }
                        return true;
                    }
                }
            } catch (error) {
                console.warn(`⚠ No se pudo verificar media: ${path}`, error);
            }
            return false;
        }

        async function findFirstExistingMedia(candidates) {
            for (const path of candidates) {
                if (await checkMediaExists(path)) {
                    return path;
                }
            }
            return '';
        }

        function buildMediaCandidates(notifId, fileFromConfig, defaultNames = []) {
            const candidates = [];
            const pushCandidate = (value) => {
                const normalizedValue = normalizePath(value);
                if (!normalizedValue) return;

                if (isAbsoluteMediaUrl(normalizedValue)) {
                    const rewrittenAbsolute = rewriteLoopbackUrlForBrowser(normalizedValue);
                    if (!candidates.includes(rewrittenAbsolute)) {
                        candidates.push(rewrittenAbsolute);
                    }
                    return;
                }

                if (!notifId) return;
                for (const baseCandidate of getStoreBaseCandidates()) {
                    const resolved = toMediaUrl(normalizedValue, notifId, baseCandidate);
                    if (resolved && !candidates.includes(resolved)) {
                        candidates.push(resolved);
                    }
                }
            };

            pushCandidate(fileFromConfig);
            for (const name of defaultNames) {
                pushCandidate(name);
            }
            return candidates;
        }

        async function resolveVideoPath(notifId, config = {}, data = {}) {
            if (data.videoPath || data.video) {
                return toMediaUrl(data.videoPath || data.video, notifId);
            }

            if (mediaPathCache.video[notifId]) {
                return mediaPathCache.video[notifId];
            }

            const candidates = buildMediaCandidates(notifId, config.video, ['video.mp4', 'video.webm', 'video.mov']);
            const foundPath = await findFirstExistingMedia(candidates);
            mediaPathCache.video[notifId] = foundPath;
            return foundPath;
        }

        async function resolveAudioPath(notifId, config = {}, data = {}) {
            if (data.audioPath || data.audio) {
                return toMediaUrl(data.audioPath || data.audio, notifId);
            }

            if (mediaPathCache.audio[notifId]) {
                return mediaPathCache.audio[notifId];
            }

            const candidates = buildMediaCandidates(notifId, config.audio, ['audio.mp3', 'audio.wav', 'audio.ogg', defaultNotificationSound]);
            const foundPath = await findFirstExistingMedia(candidates);
            mediaPathCache.audio[notifId] = foundPath || defaultNotificationSound;
            return mediaPathCache.audio[notifId];
        }

        async function waitForAudioCanPlayThrough(audioElement, timeoutMs = 5000) {
            if (audioElement.readyState >= HTMLMediaElement.HAVE_ENOUGH_DATA) {
                return;
            }

            await new Promise((resolve) => {
                let settled = false;
                const timeoutId = setTimeout(() => {
                    if (!settled) {
                        settled = true;
                        cleanup();
                        console.warn('⚠ Tiempo de espera agotado al cargar audio completo. Se intentara reproducir igualmente.');
                        resolve();
                    }
                }, timeoutMs);

                const onCanPlayThrough = () => {
                    if (!settled) {
                        settled = true;
                        cleanup();
                        resolve();
                    }
                };

                const onError = () => {
                    if (!settled) {
                        settled = true;
                        cleanup();
                        console.warn('⚠ Error al precargar audio completo.');
                        resolve();
                    }
                };

                const cleanup = () => {
                    clearTimeout(timeoutId);
                    audioElement.removeEventListener('canplaythrough', onCanPlayThrough);
                    audioElement.removeEventListener('error', onError);
                };

                audioElement.addEventListener('canplaythrough', onCanPlayThrough, { once: true });
                audioElement.addEventListener('error', onError, { once: true });
                audioElement.load();
            });
        }

        async function primeNotificationAudio(src) {
            const audioElement = document.getElementById('notification-sound');
            if (!audioElement) return;

            const finalSrc = src || defaultNotificationSound;
            if (audioWarmupState.currentSrc !== finalSrc) {
                audioWarmupState.currentSrc = finalSrc;
                audioElement.src = finalSrc;
                audioWarmupState.readyPromise = null;
            }

            if (!audioWarmupState.readyPromise) {
                audioWarmupState.readyPromise = waitForAudioCanPlayThrough(audioElement);
            }

            await audioWarmupState.readyPromise;
        }

        async function playNotificationSound(notifId, config = {}, data = {}) {
            const audioElement = document.getElementById('notification-sound');
            if (!audioElement) return;

            const audioPath = await resolveAudioPath(notifId, config, data);
            await primeNotificationAudio(audioPath);

            try {
                audioElement.currentTime = 0;
                await audioElement.play();
            } catch (error) {
                console.warn('⚠ No se pudo reproducir el sonido de notificacion:', error);

                if (audioPath !== defaultNotificationSound) {
                    try {
                        await primeNotificationAudio(defaultNotificationSound);
                        audioElement.currentTime = 0;
                        await audioElement.play();
                        console.warn('⚠ Se uso sonido por defecto por fallo en audio configurado del item.');
                    } catch (fallbackError) {
                        console.warn('⚠ Tambien fallo el sonido por defecto:', fallbackError);
                    }
                }
            }
        }

        async function fetchManifestNotificationIds() {
            for (const basePath of getStoreBaseCandidates()) {
                try {
                    const response = await fetch(`${basePath}/manifest.json`, { cache: 'no-store' });
                    if (!response.ok) {
                        continue;
                    }

                    const manifest = await response.json();
                    if (Array.isArray(manifest.notifications)) {
                        storePath = basePath;
                        return manifest.notifications;
                    }
                } catch (error) {
                    // Intentar siguiente ruta candidata.
                }
            }
            return [];
        }

        async function fetchStoreIdsFromDirectoryListing() {
            for (const basePath of getStoreBaseCandidates()) {
                try {
                    const response = await fetch(`${basePath}/`, { cache: 'no-store' });
                    if (!response.ok) {
                        continue;
                    }

                    const html = await response.text();
                    const matches = [...html.matchAll(/href=["']([^"']+)["']/gi)];
                    const ids = [];

                    for (const match of matches) {
                        const href = normalizePath(match[1]);
                        if (!href || href.startsWith('?') || href.startsWith('#')) continue;
                        if (href.includes('..')) continue;
                        const clean = href.replace(/^\//, '').replace(/\/$/, '');
                        if (!clean || clean.includes('.')) continue;
                        if (!ids.includes(clean)) {
                            ids.push(clean);
                        }
                    }

                    if (ids.length > 0) {
                        storePath = basePath;
                        return ids;
                    }
                } catch (error) {
                    // Intentar siguiente ruta candidata.
                }
            }
            return [];
        }

        async function loadNotificationConfig(notificationId) {
            if (!notificationId) return null;
            if (notificationCatalog[notificationId]) return notificationCatalog[notificationId];
            if (catalogLoadPromises[notificationId]) return catalogLoadPromises[notificationId];

            catalogLoadPromises[notificationId] = (async () => {
                try {
                    for (const basePath of getStoreBaseCandidates()) {
                        try {
                            const configResponse = await fetch(`${basePath}/${notificationId}/config.json`, { cache: 'no-store' });
                            if (!configResponse.ok) {
                                continue;
                            }

                            const config = await configResponse.json();
                            storePath = basePath;
                            notificationCatalog[notificationId] = {
                                ...config,
                                item_key: config.item_key || notificationId
                            };
                            console.log(`  ✓ ${notificationId} cargado desde ${basePath}`);
                            return notificationCatalog[notificationId];
                        } catch (error) {
                            // Intentar siguiente ruta candidata.
                        }
                    }

                    console.warn(`⚠ config.json no encontrado para: ${notificationId} en rutas candidatas`, getStoreBaseCandidates());
                    return null;
                } finally {
                    delete catalogLoadPromises[notificationId];
                }
            })();

            return catalogLoadPromises[notificationId];
        }

        // Cargar el catalogo dinamicamente desde store/ con varios fallbacks
        async function loadNotificationCatalog() {
            try {
                console.log('🔄 Iniciando carga del catálogo...');

                const manifestIds = await fetchManifestNotificationIds();
                const listingIds = await fetchStoreIdsFromDirectoryListing();
                const discoveredIds = [...new Set([...manifestIds, ...listingIds])];

                if (discoveredIds.length === 0) {
                    console.warn('⚠ No se encontraron IDs en manifest ni por listado. Se cargaran bajo demanda por WebSocket.');
                    console.warn('   Si conoces la ruta exacta, pasa ?store=/assets/store (o la que corresponda).');
                }

                for (const notificationId of discoveredIds) {
                    console.log(`  📦 Cargando: ${notificationId}...`);
                    await loadNotificationConfig(notificationId);
                }

                console.log('🎬 Catálogo completo:', notificationCatalog);
                console.log(`   Total notificaciones cargadas: ${Object.keys(notificationCatalog).length}`);
            } catch (error) {
                console.error('❌ Error cargando catálogo:', error);
            }
        }

        // Reproducir video de notificación
        async function playNotificationVideo(notifId, config = {}, data = {}) {
            try {
                const videoPath = await resolveVideoPath(notifId, config, data);
                if (!videoPath) {
                    console.warn(`❌ Video no encontrado para: ${notifId}`);
                    return 0;
                }

                const videoElement = document.getElementById('notification-video');
                const videoContainer = document.getElementById('video-container');

                videoElement.src = videoPath;
                // Reproducción resiliente: autoplay sin interacción solo es estable en mute.
                videoElement.muted = true;
                videoElement.defaultMuted = true;
                videoContainer.classList.remove('hide'); // Remover clase hide si existe
                videoContainer.style.display = 'block';

                // Esperar a que el video cargue para obtener la duración
                return new Promise((resolve) => {
                    let settled = false;
                    let fallbackTimeoutId = null;

                    const cleanupCommon = () => {
                        if (fallbackTimeoutId) {
                            clearTimeout(fallbackTimeoutId);
                            fallbackTimeoutId = null;
                        }
                        videoElement.removeEventListener('loadedmetadata', handleLoadedMetadata);
                        videoElement.removeEventListener('ended', handleEnded);
                        videoElement.removeEventListener('error', handleError);
                    };

                    const settle = (value) => {
                        if (settled) return;
                        settled = true;
                        cleanupCommon();
                        resolve(value);
                    };

                    const handleLoadedMetadata = () => {
                        const duration = videoElement.duration * 1000; // convertir a ms
                        console.log(`▶ Reproduciendo video: ${notifId} (${(duration/1000).toFixed(2)}s)`);

                        // Fallback si el evento ended no llega (corrupción de media o bloqueo del navegador).
                        const safeDuration = Number.isFinite(duration) && duration > 0 ? duration : 4200;
                        fallbackTimeoutId = setTimeout(() => {
                            console.warn(`⚠ Timeout de reproducción para ${notifId}. Cerrando notificación para evitar bloqueo.`);
                            videoContainer.classList.add('hide');
                            setTimeout(() => {
                                videoContainer.style.display = 'none';
                            }, 300);
                            settle(safeDuration);
                        }, safeDuration + 800);

                        videoElement.play().catch((err) => {
                            console.warn('Error reproduciendo video:', err);
                            videoContainer.classList.add('hide');
                            setTimeout(() => {
                                videoContainer.style.display = 'none';
                            }, 300);
                            settle(0);
                        });

                        videoElement.addEventListener('ended', handleEnded);
                    };

                    // Ocultar video cuando termine
                    const handleEnded = () => {
                        const duration = videoElement.duration * 1000;
                        videoContainer.classList.add('hide');
                        setTimeout(() => {
                            videoContainer.style.display = 'none';
                        }, 300);
                        settle(Number.isFinite(duration) && duration > 0 ? duration : 4200);
                    };

                    const handleError = () => {
                        console.error(`❌ Error cargando video: ${videoPath}`);
                        console.error('   Verifica que el video exista en la carpeta del item o llegue por WebSocket.');
                        videoContainer.classList.add('hide');
                        setTimeout(() => {
                            videoContainer.style.display = 'none';
                        }, 300);
                        settle(0);
                    };

                    videoElement.addEventListener('loadedmetadata', handleLoadedMetadata);
                    videoElement.addEventListener('error', handleError);
                });
            } catch (error) {
                console.error('Error reproduciendo video:', error);
                return 0;
            }
        }

        // Mostrar notificación dinámica (sin catálogo)
        function showDynamicNotification(data) {
            const caseType = data.caseType || 1;
            const templateName = caseType === 2 ? 'style2' : 'style1';
            const template = document.getElementById(`template-${templateName}`);
            
            if (!template) {
                console.error(`❌ Template no encontrado: template-${templateName}`);
                return;
            }
            
            const notificationElement = template.content.cloneNode(true).querySelector('.notification-box');
            
            // Aplicar datos
            const titleElement = notificationElement.querySelector('.notification-title');
            const messageElement = notificationElement.querySelector('.notification-message');
            
            if (titleElement && data.titleText) titleElement.textContent = data.titleText;
            if (messageElement && data.messageText) messageElement.textContent = data.messageText;
            
            // Si es style2, aplicar imagen de perfil
            if (templateName === 'style2' && data.profileImage) {
                const profileImg = notificationElement.querySelector('.profile-image');
                if (profileImg) {
                    profileImg.src = data.profileImage.src || data.profileImage;
                    profileImg.alt = data.profileImage.alt || 'Perfil';
                }
            }
            
            console.log(`✓ Notificación dinámica creada (${templateName}) - Título: "${data.titleText}", Mensaje: "${data.messageText}"`);
            
            // Mostrar
            const root = ensureRoot();
            root.appendChild(notificationElement);
            setTimeout(() => notificationElement.classList.add('show'), 60);
            notificationsContainer.unshift(notificationElement);
            
            // Limitar cantidad
            if (notificationsContainer.length > maxNotifications) {
                const oldNotif = notificationsContainer.pop();
                oldNotif.classList.remove('show');
                setTimeout(() => oldNotif.remove(), 260);
            }
            
            // Auto-remover después de 4 segundos
            setTimeout(() => {
                notificationElement.classList.remove('show');
                setTimeout(() => notificationElement.remove(), 260);
            }, 4000);
        }

        async function nuevaNotificacion(notifId, data = {}) {
            const hasDirectMedia = Boolean(data.videoPath || data.video || data.audioPath || data.audio);
            const config = await loadNotificationConfig(notifId);
            if (!config && !hasDirectMedia) {
                console.error(`❌ Notificación no encontrada: "${notifId}"`);
                console.error('   IDs disponibles en catálogo:', Object.keys(notificationCatalog));
                console.error('   Datos recibidos:', data);
                console.error('   💡 Asegúrate de que:');
                console.error('      1. Exista store/<item_id>/config.json');
                console.error('      2. El backend envíe el item_id correcto o paths directos por WebSocket');
                return;
            }

            const effectiveConfig = config || {};

            if (!config && hasDirectMedia) {
                console.warn(`⚠ Config no encontrada para ${notifId}. Se reproducirá usando media directa del payload.`);
            }

            console.log(`📢 Mostrando notificación: ${notifId}`, 'Config:', effectiveConfig, 'Data:', data);

            // Mostrar la notificación PRIMERO (si hay template)
            let notificationElement = null;
            const templateName = data.template || effectiveConfig.template;
            if (templateName) {
                const templateId = `template-${templateName}`;
                const template = document.getElementById(templateId);
                if (template) {
                    notificationElement = template.content.cloneNode(true).querySelector('.notification-box');

                    // Priorizar datos dinámicos (data) sobre config
                    const titleText = data.titleText || effectiveConfig.titleText || '';
                    const messageText = data.messageText || effectiveConfig.messageText || '';
                    
                    // Aplicar textos
                    const titleElement = notificationElement.querySelector('.notification-title');
                    const messageElement = notificationElement.querySelector('.notification-message');
                    
                    if (titleElement) titleElement.textContent = titleText;
                    if (messageElement) messageElement.textContent = messageText;
                    
                    // Para style-2, manejar imagen de perfil
                    if (templateName === 'style2') {
                        const profileImg = notificationElement.querySelector('.profile-image');
                        if (profileImg && data.profileImage) {
                            profileImg.src = data.profileImage.src || data.profileImage;
                            profileImg.alt = data.profileImage.alt || 'Perfil';
                        }
                    }

                    console.log(`✓ Notificación creada - Título: "${titleText}", Mensaje: "${messageText}"`);

                    const root = ensureRoot();
                    root.appendChild(notificationElement);
                    setTimeout(() => notificationElement.classList.add('show'), 60);
                    notificationsContainer.unshift(notificationElement);

                    // Garantizar límite de notificaciones simultáneas
                    if (notificationsContainer.length > maxNotifications) {
                        const oldNotif = notificationsContainer.pop();
                        oldNotif.classList.remove('show');
                        setTimeout(() => oldNotif.remove(), 260);
                    }
                } else {
                    console.warn(`⚠ Template no encontrado: ${templateId}`);
                }
            } else {
                // Template opcional: para notificaciones solo de video/audio no se muestra caja.
            }

            // Permitir pruebas silenciosas (solo video) para tests de store.
            const skipSound = Boolean(data.skipSound);
            if (!skipSound) {
                await playNotificationSound(notifId, effectiveConfig, data);
            }

            // Reproducir video (al mismo tiempo que la notificación)
            const videoDuration = await playNotificationVideo(notifId, effectiveConfig, data);
            
            // Auto-remover la notificación basado en duración del video (o 4200ms por defecto)
            if (notificationElement) {
                const duration = videoDuration || 4200;
                setTimeout(() => {
                    notificationElement.classList.remove('show');
                    setTimeout(() => notificationElement.remove(), 260);
                }, duration);
            }
        }

        // Procesar cola de notificaciones
        async function processNotificationQueue() {
            if (notificationQueue.length === 0) {
                isPlayingNotification = false;
                return;
            }

            isPlayingNotification = true;
            const nextNotification = notificationQueue.shift();
            
            console.log(`📋 Procesando notificación de la cola: ${nextNotification.notifId} (Pendientes: ${notificationQueue.length})`);
            
            await nuevaNotificacion(nextNotification.notifId, nextNotification.data);
            
            // Esperar un poco antes de procesar la siguiente
            setTimeout(processNotificationQueue, 500);
        }

        // Manejar notificación entrante
        function handleIncomingNotification(notifId, data = {}) {
            // Agregar a la cola
            notificationQueue.push({ notifId, data });
            console.log(`⏳ Notificación en cola: ${notifId} (Total en cola: ${notificationQueue.length})`);

            // Si no hay notificación reproduciéndose, iniciar el procesamiento
            if (!isPlayingNotification) {
                processNotificationQueue();
            }
        }

        // --- FUNCIONES PARA CÓDIGOS RECOMPENSABLES ---
        function showCode(code, duration, blink_start) {
            removeCode(); // Remover código anterior si existe
            
            activeCode = code;
            console.log(`🎁 Mostrando código: ${code} (Válido por ${duration}s)`);
            
            const container = document.getElementById('code-display');
            codeElement = document.createElement('div');
            codeElement.className = 'code-element';
            codeElement.textContent = code;
            codeElement.style.color = colors[0];
            container.appendChild(codeElement);
            
            // Calcular ancho aproximado del código (44px font-size + letter-spacing)
            const codeWidth = code.length * 30; // Aproximado: 30px por carácter
            const codeHeight = 54; // Altura aproximada del texto
            
            // Posición inicial aleatoria DENTRO de los límites visibles
            const maxX = Math.max(100, window.innerWidth - codeWidth - 50);
            const maxY = Math.max(100, window.innerHeight - codeHeight - 50);
            let x = 50 + Math.random() * (maxX - 50);
            let y = 50 + Math.random() * (maxY - 50);
            codeElement.style.left = `${x}px`;
            codeElement.style.top = `${y}px`;
            
            // Velocidad aleatoria más sutil
            let speedX = (Math.random() - 0.5) * 1.2;
            let speedY = (Math.random() - 0.5) * 1.2;
            
            let timeLeft = duration;
            let isBlinking = false;
            let colorChangeCounter = 0;
            
            // Animación de movimiento continuo
            const animateCode = () => {
                if (!codeElement || !codeElement.parentNode) {
                    return; // Detener si el elemento fue removido
                }
                
                x += speedX;
                y += speedY;
                
                // Calcular límites dinámicos
                const codeWidth = code.length * 30;
                const codeHeight = 54;
                const minX = 20;
                const minY = 20;
                const maxX = window.innerWidth - codeWidth - 20;
                const maxY = window.innerHeight - codeHeight - 20;
                
                // Rebotar en los bordes con suavidad
                if (x <= minX || x >= maxX) {
                    speedX = -speedX;
                    x = Math.max(minX, Math.min(x, maxX)); // Corregir posición
                }
                if (y <= minY || y >= maxY) {
                    speedY = -speedY;
                    y = Math.max(minY, Math.min(y, maxY)); // Corregir posición
                }
                
                // Asegurar que siempre esté dentro de los límites
                x = Math.max(minX, Math.min(x, maxX));
                y = Math.max(minY, Math.min(y, maxY));
                
                codeElement.style.left = `${x}px`;
                codeElement.style.top = `${y}px`;
                
                // Cambiar color cada 30 frames (más suave)
                colorChangeCounter++;
                if (colorChangeCounter >= 30 && !isBlinking) {
                    colorIndex = (colorIndex + 1) % colors.length;
                    codeElement.style.color = colors[colorIndex];
                    colorChangeCounter = 0;
                }
                
                animationFrameId = requestAnimationFrame(animateCode);
            };
            
            animateCode();
            
            // Iniciar parpadeo en los últimos 30 segundos
            const blinkStartTime = (duration - blink_start) * 1000;
            setTimeout(() => {
                isBlinking = true;
                console.log(`⏳ Código parpadeando... (${blink_start}s restantes)`);
                codeBlinkInterval = setInterval(() => {
                    codeElement.style.opacity = codeElement.style.opacity === '0' ? '1' : '0';
                }, 300);
            }, blinkStartTime);
            
            // Auto-remover después de la duración
            codeTimeout = setTimeout(() => {
                console.log(`❌ Código expirado: ${code}`);
                removeCode();
            }, duration * 1000);
        }
        
        function removeCode() {
            if (codeTimeout) clearTimeout(codeTimeout);
            if (codeBlinkInterval) clearInterval(codeBlinkInterval);
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            if (codeElement) {
                // Fadeout suave
                codeElement.style.opacity = '0';
                setTimeout(() => {
                    if (codeElement && codeElement.parentNode) {
                        codeElement.remove();
                    }
                    codeElement = null;
                }, 500); // Esperar a que termine el fadeout
            }
            activeCode = null;
        }

        // --- Conexión WebSocket con reconexión automática ---
        let ws;
        let isConnecting = false;
        let reconnectAttempts = 0;

        function buildWebSocketUrl() {
            const params = new URLSearchParams(window.location.search);
            const directUrl = params.get("ws");
            if (directUrl) {
                return directUrl;
            }

            const protocol = window.location.protocol === "https:" ? "wss" : "ws";
            const path = params.get("wspath") || "/ws";

            const explicitHost = params.get("wshost");
            const explicitPort = params.get("wsport");
            if (explicitHost || explicitPort) {
                const host = explicitHost || window.location.hostname || "127.0.0.1";
                const inferredPort = window.location.port || (window.location.protocol === "https:" ? "443" : "80");
                const port = explicitPort || inferredPort;
                return `${protocol}://${host}:${port}${path}`;
            }

            return `${protocol}://${window.location.host}${path}`;
        }

        const WS_URL = buildWebSocketUrl();
        
        function connectWebSocket() {
            if (isConnecting) {
                console.log('[WS] ⏳ Ya hay un intento de conexión en curso...');
                return;
            }
            
            isConnecting = true;
            console.log(`[WS] 🔄 Intentando conectar... (Intento #${reconnectAttempts + 1})`);
            
            try {
                ws = new WebSocket(WS_URL);
            } catch (error) {
                console.error('[WS] ❌ Error creando WebSocket:', error);
                isConnecting = false;
                setTimeout(connectWebSocket, 3000);
                return;
            }

            ws.addEventListener('open', () => {
                console.log(`[WS] ✅ Conectado a ${WS_URL}`);
                isConnecting = false;
                reconnectAttempts = 0;
            });

            ws.addEventListener('message', (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('[WS] 📨 Mensaje recibido:', data);
                    
                    // Manejar notificaciones
                    if (data && data.type === 'notification') {
                        // CASO 1: Notificación de tienda (con notificationId)
                        if (data.notificationId) {
                            const notifId = data.notificationId;
                            
                            // Validar que el notifId no sea un placeholder
                            if (notifId.includes('<') || notifId.includes('>')) {
                                console.error('[WS] ❌ notificationId inválido:', notifId);
                                console.error('      Verifica que el backend envíe el ID correcto del item');
                                console.error('      Datos recibidos:', JSON.stringify(data, null, 2));
                                return;
                            }
                            
                            console.log('[WS] 🎁 Notificación de tienda:', notifId);
                            handleIncomingNotification(notifId, data);
                        } 
                        // CASO 2: Notificación de evento (sin notificationId, usa caseType)
                        else if (data.caseType) {
                            console.log('[WS] 📢 Notificación de evento (caseType:', data.caseType + ')');
                            showDynamicNotification(data);
                        }
                        else {
                            console.error('[WS] ❌ Notificación sin notificationId ni caseType:', data);
                        }
                    }
                    
                    // Manejar códigos recompensables
                    if (data && data.type === 'show_code') {
                        console.log('[WS] 🎁 Código recibido:', data.code);
                        showCode(data.code, data.duration, data.blink_start);
                    }
                    
                    // Código canjeado - remover de pantalla
                    if (data && data.type === 'code_redeemed') {
                        removeCode();
                    }
                } catch (e) {
                    console.warn('[WS] Error parseando mensaje:', e);
                }
            });

            ws.addEventListener('close', (event) => {
                console.log(`[WS] 🔴 Desconectado del servidor (Código: ${event.code})`);
                isConnecting = false;
                reconnectAttempts++;
                const delay = Math.min(3000 + (reconnectAttempts * 1000), 10000); // Max 10s
                console.log(`[WS] 🔄 Reintentando conexión en ${delay/1000}s...`);
                setTimeout(connectWebSocket, delay);
            });

            ws.addEventListener('error', (err) => {
                console.error('[WS] ❌ Error en WebSocket:', err);
                isConnecting = false;
                // El evento 'close' se disparará automáticamente después del error
            });
        }

        // Inicializar al cargar la página
        window.addEventListener('load', () => {
            primeNotificationAudio(defaultNotificationSound).catch(() => {});
            if (shouldPreloadCatalog()) {
                loadNotificationCatalog();
            } else {
                console.log('ℹ Escaneo de catálogo desactivado por defecto para evitar 404 de rutas estáticas.');
                console.log('   Usa ?preloadStore=1 para forzar precarga de store.');
            }
            connectWebSocket();
        });
    </script>
</body>
